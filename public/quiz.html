<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watt Wise - Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles/global.css">

    <link rel="stylesheet" href="styles/nav-sidebar.css">
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <nav class="nav-sidebar grid-1">
        <header>
            <a href="home.html">
                <i class="fa-solid fa-leaf grid-1"></i>
                <h1 class="grid-2">WattWise</h1>
                <span class="grid-3">Small choices. Big changes.</span>
            </a>
        </header>

        <ul>
            <a class="selected" href="#">
                <i class="fa-regular fa-rectangle-list"></i>
                <p>Quiz</p>
            </a>

            <a href="#">
                <i class="fa-solid fa-list-check"></i>
                <p>Results</p>
            </a>

            <a href="#">
                <i class="fa-regular fa-clock"></i>
                <p>History</p>
            </a>

            <a href="#">
                <i class="fa-regular fa-lightbulb"></i>
                <p>Tips</p>
            </a>

            <a href="#">
                <i class="fa-regular fa-user"></i>
                <p>Profile</p>       
            </a>
        </ul>
    </nav>

    <main class="grid-2">
        <section class="topbar-wrapper grid-1">
            <i class="fa-regular fa-bell"></i>
            <div class="profile-wrapper">
                <span class="profile-icon">KN</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </section>

        <section class="quiz-wrapper grid-2">
            <div class="quiz-header-wrapper">
                <div class="quiz-title-wrapper">
                    <img class="grid-1" src="assets/icons/leaf-icon.svg" width="20">
                    <h2 class="grid-2">Quiz</h2>
                    <p class="grid-3">How many resources are we actually using?</p>
                </div>
                <div class="quiz-progress-bar-wrapper">
                    <div>
                        <p class="grid-1">Question 1 of 6</p>
                        <div class="grid-2" id="progress-bar"></div>
                        <p class="grid-3" id="progress-label">17%</p>
                    </div>
                </div>
            </div>

            <form class="quiz-main-wrapper">
                <div class=" grid-1 quiz-question-wrapper">
                    <img class="grid-1" src="assets/icons/question-email-big.svg" width="60"></img>
                    <h2 class="grid-2">How many e-mails do you receive daily?</h2>
                    <span class="grid-3">E-mails are saved in datacenters that use a lot of energy.<br>Less trash = less emissions</span>
                </div>
                
                <ul class="quiz-choices-wrapper">
                    <label class="quiz-choice">
                        <input type="radio" id="quiz-choice-1" name="quiz-choice">
                        <img src="assets/icons/question-email-small.svg" width="40"></img>
                        <span class="quiz-choice-text">0 — 10 e-mails</span>
                    </label>
                    <label class="quiz-choice">
                        <input type="radio" id="quiz-choice-2" name="quiz-choice">
                        <img src="assets/icons/question-email-small.svg" width="40"></img>
                        <span class="quiz-choice-text">10 — 50 e-mails</span>
                    </label>
                    <label class="quiz-choice">
                        <input type="radio" id="quiz-choice-3" name="quiz-choice">
                        <img src="assets/icons/question-email-small.svg" width="40"></img>
                        <span class="quiz-choice-text">50+ e-mails</span>
                    </label>
                </ul>

                <div class="quiz-buttons-wrapper">
                    <button type="submit" id="quiz-next-question-button">Next question <i class="fa-solid fa-arrow-right-long"></i></button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
